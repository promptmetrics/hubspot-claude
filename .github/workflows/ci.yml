name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: true

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + test deps
        run: pip install -e ".[dev]"

      - name: Run test suite (incl. routing corpus + regression gate)
        run: pytest -x

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate plugin manifests + hooks
        run: claude plugin validate ./

      - name: Shipping-artifact allowlist gate
        run: bash scripts/check-artifact-allowlist.sh
