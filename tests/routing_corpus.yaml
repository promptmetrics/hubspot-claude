# Routing accuracy corpus
# Each entry: request text -> expected route(s)
# `mode: fast_path` entries are gated by tests/test_routing_corpus_gate.py against
# the live keyword router `route_request`. expected_routes are the CORRECT
# agent(s) for the request — the gate is an accuracy assert, not a "lock current
# output" baseline. Every specialist in _AGENT_REGISTRY should have at least one
# fast_path entry (enforced by the coverage check in test_routing_corpus_gate.py).
# `mode: llm` entries are aspirational targets for the (stub) LLM router and are
# skipped by the gate; the LLM router is not yet live.

- request: "find all contacts"
  expected_routes: ["objects"]
  mode: fast_path

- request: "create a new company"
  expected_routes: ["objects"]
  mode: fast_path

- request: "update deal properties"
  expected_routes: ["objects", "properties"]
  mode: fast_path

- request: "list workflows"
  expected_routes: ["lists", "workflows"]
  mode: fast_path

- request: "add contacts to a list"
