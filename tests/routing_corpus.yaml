# Routing regression corpus
# Each entry: request text -> expected route(s)
# `mode: fast_path` entries are gated by tests/test_routing_corpus_gate.py against
# the live keyword router `route_request` — expected_routes reflect CURRENT
# route_request output and lock it as the regression baseline.
# `mode: llm` entries are aspirational targets for the (stub) LLM router and are
# skipped by the gate; the LLM router is not yet live.

- request: "find all contacts"
  expected_routes: ["objects"]
  mode: fast_path

- request: "create a new company"
  expected_routes: ["objects"]
  mode: fast_path

- request: "update deal properties"
  expected_routes: ["objects"]
  mode: fast_path

- request: "list workflows"
  expected_routes: ["lists", "workflows"]
  mode: fast_path

- request: "add contacts to a list"
  expected_routes: ["lists", "objects"]
  mode: fast_path

- request: "create a workflow to send welcome emails"
  expected_routes: ["objects", "workflows"]
  mode: fast_path

- request: "log a call with a contact"
  expected_routes: ["engagements"]
  mode: fast_path

- request: "get pipeline stages for deals"
  expected_routes: ["associations", "objects"]
  mode: fast_path

- request: "how many contacts were created last week"
  expected_routes: ["associations", "objects"]
  mode: fast_path

- request: "clean up duplicate contacts"
  expected_routes: ["objects"]
  mode: llm

- request: "associate a deal with a company"
  expected_routes: ["objects"]
  mode: llm

- request: "create a custom property on contacts"
  expected_routes: ["associations", "objects"]
  mode: fast_path

- request: "show me the analytics for email opens"
  expected_routes: []
  mode: llm

- request: "create a list of contacts who haven't engaged in 30 days"
  expected_routes: ["associations", "objects"]
  mode: fast_path

- request: "remove from list"
  expected_routes: ["lists"]
  mode: fast_path

# Edge cases
- request: ""
  expected_routes: []
  mode: fast_path

- request: "hello"
  expected_routes: []
  mode: fast_path